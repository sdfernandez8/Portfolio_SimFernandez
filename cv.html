<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume | Sim David Fernandez</title>

<link rel="stylesheet" href="styles.css">

<style>
/* FULLSCREEN CV VIEW */

body{
    margin:0;
    background:#0f1115;
    overflow:hidden;
}

/* NAV (overlay style) */
.nav{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 30px;
    background:rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    z-index:10;
}

.logo{
    color:#1560BD;
    font-size:18px;
    font-weight:700;
}

/* BACK BUTTON */
.nav-btn{
    background:#1560BD;
    color:#fff;
    padding:8px 14px;
    border-radius:999px;
    text-decoration:none;
    font-weight:600;
    transition:0.3s;
}

.nav-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(21,96,189,0.4);
}

/* FULLSCREEN PDF */
.cv-container{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100vh;
    padding-top:60px; /* space for nav */
    box-sizing:border-box;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}
</style>

</head>

<body>

<header class="nav">
    <div class="nav-left">
        <h1 class="logo">CV VIEWER</h1>
    </div>

    <div class="nav-right">
        <a href="index.html" class="nav-btn">← Back</a>
    </div>
</header>

<div class="cv-container">
    <iframe src="./assets/Fernandez,Sim-David_CV.pdf"></iframe>
</div>

</body>
</html>
